name: Clarity
options:
  bundleIdPrefix: com.personalfinance
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGNING_ALLOWED: "NO"
    GENERATE_INFOPLIST_FILE: "YES"

targets:
  Clarity:
    type: application
    platform: iOS
    sources:
      - path: Clarity/Sources
      - path: Clarity/Resources
        buildPhase: resources
      - path: Clarity/Info.plist
        buildPhase: none
    settings:
      base:
        INFOPLIST_FILE: Clarity/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.personalfinance.clarity
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

schemes:
  Clarity:
    build:
      targets:
        Clarity: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release