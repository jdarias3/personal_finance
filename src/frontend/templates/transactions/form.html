{% extends "base.html" %}

{% block title %}{{ 'Edit Transaction' if transaction else 'Add Transaction' }} - Clarity{% endblock %}

{% block content %}
<div class="container" style="padding: 2rem 1rem;">
    <div class="page-header">
        <h1 class="page-title">{{ 'Edit Transaction' if transaction else 'Add Transaction' }}</h1>
    </div>
    
    <div class="card" style="max-width: 500px;">
        <form action="{{ '/transactions/' + transaction.id + '/edit' if transaction else '/transactions/new' }}" method="post">
            <div class="form-group">
                <label class="form-label" for="account_id">Account</label>
                <select id="account_id" name="account_id" class="form-select" required>
                    <option value="">Select account...</option>
                    {% for account in accounts %}
                    <option value="{{ account.id }}" {% if transaction and transaction.account_id == account.id %}selected{% endif %}>{{ account.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Type</label>
                <input type="hidden" id="transaction_type" name="transaction_type" value="{{ 'outflow' if transaction and transaction.transaction_type == 'outflow' else 'inflow' if transaction and transaction.transaction_type == 'inflow' else 'outflow' }}">
                <div style="display: flex; gap: 0.75rem;">
                    <button type="button" class="btn" id="btn-outflow"
                            style="border: 1px solid #ccc; padding: 0.5rem 1rem; background: {% if transaction and transaction.transaction_type == 'outflow' or not transaction %}#dc3545; color: white;{% else %}white;{% endif %}"
                            onclick="selectType('outflow')">Expense</button>
                    <button type="button" class="btn" id="btn-inflow"
                            style="border: 1px solid #ccc; padding: 0.5rem 1rem; background: {% if transaction and transaction.transaction_type == 'inflow' %}#28a745; color: white;{% else %}white;{% endif %}"
                            onclick="selectType('inflow')">Income</button>
                </div>
            </div>
            <script>
            function selectType(type) {
                document.getElementById('transaction_type').value = type;
                document.getElementById('btn-outflow').style = type === 'outflow' ? 'border: 1px solid #ccc; padding: 0.5rem 1rem; background: #dc3545; color: white;' : 'border: 1px solid #ccc; padding: 0.5rem 1rem; background: white;';
                document.getElementById('btn-inflow').style = type === 'inflow' ? 'border: 1px solid #ccc; padding: 0.5rem 1rem; background: #28a745; color: white;' : 'border: 1px solid #ccc; padding: 0.5rem 1rem; background: white;';
            }
            </script>
            
            <div class="form-group">
                <label class="form-label" for="amount">Amount</label>
                <input type="number" id="amount" name="amount" class="form-input" 
                       step="0.01" min="0.01" value="{{ (transaction.amount_cents / 100) if transaction else '' }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="date">Date</label>
                <input type="date" id="date" name="date" class="form-input" 
                       value="{{ transaction.date if transaction else today }}" required>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="description">Description</label>
                <input type="text" id="description" name="description" class="form-input" 
                       value="{{ transaction.description if transaction else '' }}" required
                       placeholder="e.g., Grocery shopping">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="payee">Payee (optional)</label>
                <input type="text" id="payee" name="payee" class="form-input" 
                       value="{{ transaction.payee if transaction else '' }}"
                       placeholder="e.g., Whole Foods">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="category_id">Category</label>
                <div style="display: flex; gap: 0.5rem;">
                    <select id="category_id" name="category_id" class="form-select" style="flex: 1;">
                        <option value="">Uncategorized</option>
                        {% for category in categories %}
                        <option value="{{ category.id }}" {% if transaction and transaction.category_id == category.id %}selected{% endif %}>{{ category.name }}</option>
                        {% endfor %}
                    </select>
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('new-category-form').classList.toggle('hidden')">+</button>
                </div>
            </div>
            <div id="new-category-form" class="form-group hidden" style="display: none;">
                <label class="form-label" for="new_cat_name">New Category Name</label>
                <div style="display: flex; gap: 0.5rem;">
                    <input type="text" id="new_cat_name" name="new_category_name" class="form-input" placeholder="Category name">
                    <input type="hidden" name="create_category" value="1">
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="notes">Notes (optional)</label>
                <textarea id="notes" name="notes" class="form-input" rows="3" placeholder="Any additional details...">{{ transaction.notes if transaction else '' }}</textarea>
            </div>
            
            <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary">
                    {{ 'Save Changes' if transaction else 'Add Transaction' }}
                </button>
                <a href="/transactions" class="btn btn-secondary">Cancel</a>
                {% if transaction %}
                <a href="/transactions/{{ transaction.id }}/delete" class="btn btn-danger" 
                   onclick="return confirm('Are you sure you want to reverse this transaction?')">Reverse</a>
                {% endif %}
            </div>
        </form>
    </div>
</div>
{% endblock %}
