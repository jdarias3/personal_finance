{% extends "base.html" %}

{% block title %}{{ 'Edit Debt' if debt else 'Add Debt' }} - Clarity{% endblock %}

{% block content %}
<div class="container" style="padding: 2rem 1rem;">
    <div class="page-header">
        <h1 class="page-title">{{ 'Edit Debt' if debt else 'Add Debt' }}</h1>
    </div>
    
    <div class="card" style="max-width: 500px;">
        <form action="{{ '/debts/' + (debt.id | string) + '/edit' if debt else '/debts/new' }}" method="post">
            <div class="form-group">
                <label class="form-label" for="name">Debt Name</label>
                <input type="text" id="name" name="name" class="form-input" 
                       value="{{ debt.name if debt else '' }}" required
                       placeholder="e.g., Chase Credit Card">
            </div>
            
            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label" for="initial_amount">Original Balance</label>
                    <input type="number" id="initial_amount" name="initial_amount" class="form-input" 
                           step="0.01" min="0" value="{{ (debt.initial_amount_cents / 100) if debt else '' }}" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="current_balance">Current Balance</label>
                    <input type="number" id="current_balance" name="current_balance" class="form-input" 
                           step="0.01" min="0" value="{{ (debt.current_balance_cents / 100) if debt else '' }}" required>
                </div>
            </div>
            
            <div class="grid grid-2">
                <div class="form-group">
                    <label class="form-label" for="interest_rate">Interest Rate (%)</label>
                    <input type="number" id="interest_rate" name="interest_rate" class="form-input" 
                           step="0.01" min="0" max="100" value="{{ (debt.interest_rate / 100) if debt else '' }}" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="minimum_payment">Minimum Payment</label>
                    <input type="number" id="minimum_payment" name="minimum_payment" class="form-input" 
                           step="0.01" min="0" value="{{ (debt.minimum_payment_cents / 100) if debt else '' }}" required>
                </div>
            </div>
            
            <div class="form-group">
                <label class="form-label" for="due_day">Due Day of Month (1-31)</label>
                <input type="number" id="due_day" name="due_day" class="form-input" 
                       min="1" max="31" value="{{ debt.due_day if debt else '' }}"
                       placeholder="e.g., 15">
            </div>
            
            <div class="form-group">
                <label class="form-label" for="account_id">Linked Account (optional)</label>
                <select id="account_id" name="account_id" class="form-select">
                    <option value="">None</option>
                    {% for account in accounts %}
                    <option value="{{ account.id }}" {% if debt and debt.account_id == account.id %}selected{% endif %}>{{ account.name }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <div style="display: flex; gap: 0.75rem; margin-top: 1.5rem;">
                <button type="submit" class="btn btn-primary">
                    {{ 'Save Changes' if debt else 'Add Debt' }}
                </button>
                <a href="/debts" class="btn btn-secondary">Cancel</a>
                {% if debt %}
                <a href="/debts/{{ debt.id }}/delete" class="btn btn-danger" 
                   onclick="return confirm('Are you sure you want to delete this debt?')">Delete</a>
                {% endif %}
            </div>
        </form>
    </div>
</div>
{% endblock %}
